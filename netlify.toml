[build]
  # React + Vite 빌드 설정
  command = "npm run build"
  publish = "dist"
  
  # Node.js 버전 설정
  [build.environment]
    NODE_VERSION = "18"

# Function settings
[functions]
  directory = "netlify/functions"

# Redirects for API routes
[[redirects]]
  from = "/api/realtime-data"
  to = "/.netlify/functions/realtime-data"
  status = 200

[[redirects]]
  from = "/api/streaming-data" 
  to = "/.netlify/functions/streaming-data"
  status = 200

[[redirects]]
  from = "/api/system-status"
  to = "/.netlify/functions/system-status"
  status = 200

# Legacy API redirects (fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/realtime-data"
  status = 200
  force = false

# SPA 라우팅을 위한 리다이렉트 (모든 경로를 index.html로)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for CORS
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"


